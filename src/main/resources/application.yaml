spring:
  application:
    name: batch-demo
  datasource:
    url: ${database.url}
    username: ${database.username}
    password: ${database.password}
    driverClassName: ${database.driverClassName}
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        trace: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always
  mail:
    host: ${mail.host}
